name: audit

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    # Every Monday 04:17 UTC.
    - cron: "17 4 * * 1"

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: drop MSRV pin so cargo-audit can build
        run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: run cargo audit
        # Mirrors `deny.toml` advisory ignores. As of v0.1.1 (MSRV 1.88)
        # we no longer pin to vulnerable `time` 0.3.45 or to jieba 0.6
        # (which transitively pulled unmaintained `fxhash`); the only
        # remaining ignore is `paste`, transitive via `ort-sys`.
        run: cargo audit --ignore RUSTSEC-2024-0436
