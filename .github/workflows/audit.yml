name: audit

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    # Every Monday 04:17 UTC.
    - cron: "17 4 * * 1"

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
