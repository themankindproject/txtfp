name: audit

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    # Every Monday 04:17 UTC.
    - cron: "17 4 * * 1"

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: drop MSRV pin so cargo-audit can build
        run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: run cargo audit
        # Mirrors `deny.toml` advisory ignores plus a few that don't affect
        # us at v0.1.0:
        #   * RUSTSEC-2024-0436 — `paste` unmaintained, transitive via ort-sys.
        #   * RUSTSEC-2025-0057 — `fxhash` unmaintained, transitive via jieba 0.6.
        #   * RUSTSEC-2026-0009 — `time` 0.3.45 vuln; the fix needs Rust 1.88
        #     and we pin MSRV 1.85. The vulnerable path is `cookie_store`
        #     date parsing inside `ureq`; we never enable cookie persistence.
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2026-0009
